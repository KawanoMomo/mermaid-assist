<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MermaidAssist</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── CSS Variables ─────────────────────────────────────────────────────────── */
:root {
  --bg-primary:   #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary:  #21262d;
  --border:       #30363d;
  --text-primary: #c9d1d9;
  --text-secondary: #8b949e;
  --accent:       #7c8cf8;
  --accent-green: #7ee787;
  --accent-red:   #f74a4a;
  --accent-orange: #ffa657;
  --font-mono: 'IBM Plex Mono', 'Consolas', monospace;
  --font-sans: 'Noto Sans JP', 'Segoe UI', sans-serif;
}

/* ── Reset / Base ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 13px;
}

/* ── App Shell ─────────────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Toolbar ───────────────────────────────────────────────────────────────── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  height: 38px;
}

#toolbar .logo {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
  margin-right: 8px;
  white-space: nowrap;
  letter-spacing: -0.5px;
}

.tb-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}

.tb-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.1s, border-color 0.1s;
}
.tb-btn:hover {
  background: var(--bg-tertiary);
  border-color: var(--border);
}
.tb-btn:active {
  background: var(--bg-primary);
}
.tb-btn:disabled {
  color: var(--text-secondary);
  cursor: default;
}
.tb-btn:disabled:hover {
  background: transparent;
  border-color: transparent;
}

#zoom-display {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  width: 42px;
  text-align: center;
  user-select: none;
}

/* Export menu wrapper */
.export-wrap {
  position: relative;
}

#export-menu {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  z-index: 200;
  min-width: 180px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
#export-menu.open { display: block; }

#export-menu button {
  display: block;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 12px;
  padding: 8px 14px;
  text-align: left;
  cursor: pointer;
}
#export-menu button:hover { background: var(--bg-tertiary); }

/* Diagram type select */
#diagram-type {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
  margin-left: auto;
}
#diagram-type:focus { outline: none; border-color: var(--accent); }

/* ── Main Area ─────────────────────────────────────────────────────────────── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Pane Resizer ─────────────────────────────────────────────────────────── */
.pane-resizer {
  width: 5px;
  cursor: col-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
  z-index: 10;
}
.pane-resizer:hover, .pane-resizer.dragging {
  background: var(--accent);
}

/* ── Editor Pane ───────────────────────────────────────────────────────────── */
#editor-pane {
  display: flex;
  flex-direction: column;
  width: 30%;
  min-width: 180px;
  border-right: 1px solid var(--border);
  background: var(--bg-primary);
  flex-shrink: 0;
}

#editor-pane-header {
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#editor-wrap {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}

#line-numbers {
  padding: 8px 6px 8px 8px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  text-align: right;
  user-select: none;
  overflow: hidden;
  flex-shrink: 0;
  min-width: 36px;
  white-space: pre;
}

#editor {
  flex: 1;
  padding: 8px 10px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg-primary);
  border: none;
  outline: none;
  resize: none;
  overflow: auto;
  tab-size: 4;
  white-space: pre;
  overflow-wrap: normal;
}

/* ── Preview Pane ──────────────────────────────────────────────────────────── */
#preview-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-primary);
}

#preview-pane-header {
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#preview-container {
  flex: 1;
  overflow: auto;
  position: relative;
  padding: 16px;
}

/* SVG wrapper: inline-block so it sizes to the SVG's natural dimensions */
#preview-svg {
  display: inline-block;
  transform-origin: 0 0;
  position: relative;
}
#preview-svg svg {
  display: block;
}

/* Overlay: positioned exactly on top of #preview-svg */
#overlay-layer {
  position: absolute;
  top: 16px; /* matches container padding */
  left: 16px;
  pointer-events: none;
  transform-origin: 0 0;
}
#overlay-layer > * {
  pointer-events: auto;
}

/* ── Properties Pane ───────────────────────────────────────────────────────── */
#props-pane {
  display: flex;
  flex-direction: column;
  width: 220px;
  border-left: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}

#props-pane-header {
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#props-content {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  font-size: 12px;
  color: var(--text-secondary);
}

/* ── Status Bar ────────────────────────────────────────────────────────────── */
#statusbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 3px 10px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  height: 24px;
  font-family: var(--font-mono);
  font-size: 11px;
}

#status-parse { color: var(--accent-green); }
#status-parse.error { color: var(--accent-red); }
#status-info  { color: var(--text-secondary); margin-left: auto; }

/* ── Scrollbar Styling ─────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* ── Overlay hover effects ──────────────────────────────────────────────────── */
#overlay-layer .overlay-bar {
  transition: fill 0.1s, opacity 0.1s;
}
#overlay-layer .overlay-bar:hover {
  fill: rgba(124, 140, 248, 0.15) !important;
  cursor: move;
}
</style>
</head>
<body>
<div id="app">

  <!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
  <div id="toolbar">
    <span class="logo">MermaidAssist</span>

    <button class="tb-btn" id="btn-open" title="ファイルを開く">Open</button>
    <button class="tb-btn" id="btn-save" title="ファイルを保存">Save</button>

    <div class="tb-sep"></div>

    <button class="tb-btn" id="btn-undo" title="元に戻す (Ctrl+Z)" disabled>↩ Undo</button>
    <button class="tb-btn" id="btn-redo" title="やり直す (Ctrl+Y)" disabled>↪ Redo</button>

    <div class="tb-sep"></div>

    <button class="tb-btn" id="btn-zoom-out" title="縮小">－</button>
    <span id="zoom-display">100%</span>
    <button class="tb-btn" id="btn-zoom-in"  title="拡大">＋</button>
    <button class="tb-btn" id="btn-zoom-fit" title="幅に合わせる">Fit</button>

    <div class="tb-sep"></div>

    <div class="export-wrap">
      <button class="tb-btn" id="btn-export" title="エクスポート">Export ▾</button>
      <div id="export-menu">
        <button id="exp-svg">SVGとして保存</button>
        <button id="exp-png">PNGとして保存</button>
        <button id="exp-png-transparent">PNG（透過背景）</button>
        <button id="exp-clipboard">クリップボードにコピー</button>
      </div>
    </div>

    <select id="diagram-type" title="図の種類">
      <option value="gantt">Gantt</option>
    </select>
  </div>

  <!-- ── Main 3-pane area ────────────────────────────────────────────────── -->
  <div id="main">

    <!-- Editor pane (30%) -->
    <div id="editor-pane">
      <div id="editor-pane-header">Editor</div>
      <div id="editor-wrap">
        <div id="line-numbers">1</div>
        <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>
    </div>

    <div class="pane-resizer" id="resizer-left"></div>

    <!-- Preview pane (flex) -->
    <div id="preview-pane">
      <div id="preview-pane-header">Preview</div>
      <div id="preview-container">
        <div id="preview-svg"></div>
        <svg id="overlay-layer" width="0" height="0"></svg>
      </div>
    </div>

    <div class="pane-resizer" id="resizer-right"></div>

    <!-- Properties pane (220px) -->
    <div id="props-pane">
      <div id="props-pane-header">Properties</div>
      <div id="props-content">
        <p style="color:var(--text-secondary);font-size:11px;">タスクを選択してください</p>
      </div>
    </div>

  </div><!-- /#main -->

  <!-- ── Status bar ──────────────────────────────────────────────────────── -->
  <div id="statusbar">
    <span id="status-parse">Ready</span>
    <span id="status-info"></span>
  </div>

</div><!-- /#app -->

  <!-- Drag tooltip -->
  <div id="drag-tooltip" style="display:none; position:fixed; pointer-events:none; z-index:1000;
    background:var(--bg-secondary); border:1px solid var(--accent); color:var(--text-primary);
    font-family:var(--font-mono); font-size:11px; padding:4px 8px; border-radius:4px;
    box-shadow:0 2px 8px rgba(0,0,0,0.4); white-space:nowrap;"></div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".mmd,.mermaid,.txt" style="display:none">

<script src="src/core/date-utils.js"></script>
<script src="src/core/html-utils.js"></script>
<script src="src/app.js"></script>
<!-- mermaid.js: loaded after main script; available by DOMContentLoaded -->
<script src="lib/mermaid.min.js"></script>
</body>
</html>
