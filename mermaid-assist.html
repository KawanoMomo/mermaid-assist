<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MermaidAssist</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── CSS Variables ─────────────────────────────────────────────────────────── */
:root {
  --bg-primary:   #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary:  #21262d;
  --border:       #30363d;
  --text-primary: #c9d1d9;
  --text-secondary: #8b949e;
  --accent:       #7c8cf8;
  --accent-green: #7ee787;
  --accent-red:   #f74a4a;
  --accent-orange: #ffa657;
  --font-mono: 'IBM Plex Mono', 'Consolas', monospace;
  --font-sans: 'Noto Sans JP', 'Segoe UI', sans-serif;
}

/* ── Reset / Base ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 13px;
}

/* ── App Shell ─────────────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Toolbar ───────────────────────────────────────────────────────────────── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  height: 38px;
}

#toolbar .logo {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
  margin-right: 8px;
  white-space: nowrap;
  letter-spacing: -0.5px;
}

.tb-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}

.tb-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.1s, border-color 0.1s;
}
.tb-btn:hover {
  background: var(--bg-tertiary);
  border-color: var(--border);
}
.tb-btn:active {
  background: var(--bg-primary);
}
.tb-btn:disabled {
  color: var(--text-secondary);
  cursor: default;
}
.tb-btn:disabled:hover {
  background: transparent;
  border-color: transparent;
}

#zoom-display {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  width: 42px;
  text-align: center;
  user-select: none;
}

/* Export menu wrapper */
.export-wrap {
  position: relative;
}

#export-menu {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  z-index: 200;
  min-width: 180px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
#export-menu.open { display: block; }

#export-menu button {
  display: block;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 12px;
  padding: 8px 14px;
  text-align: left;
  cursor: pointer;
}
#export-menu button:hover { background: var(--bg-tertiary); }

/* Diagram type select */
#diagram-type {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
  margin-left: auto;
}
#diagram-type:focus { outline: none; border-color: var(--accent); }

/* ── Main Area ─────────────────────────────────────────────────────────────── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Pane Resizer ─────────────────────────────────────────────────────────── */
.pane-resizer {
  width: 5px;
  cursor: col-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
  z-index: 10;
}
.pane-resizer:hover, .pane-resizer.dragging {
  background: var(--accent);
}

/* ── Editor Pane ───────────────────────────────────────────────────────────── */
#editor-pane {
  display: flex;
  flex-direction: column;
  width: 30%;
  min-width: 180px;
  border-right: 1px solid var(--border);
  background: var(--bg-primary);
  flex-shrink: 0;
}

#editor-pane-header {
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#editor-wrap {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}

#line-numbers {
  padding: 8px 6px 8px 8px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  text-align: right;
  user-select: none;
  overflow: hidden;
  flex-shrink: 0;
  min-width: 36px;
  white-space: pre;
}

#editor {
  flex: 1;
  padding: 8px 10px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg-primary);
  border: none;
  outline: none;
  resize: none;
  overflow: auto;
  tab-size: 4;
  white-space: pre;
  overflow-wrap: normal;
}

/* ── Preview Pane ──────────────────────────────────────────────────────────── */
#preview-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-primary);
}

#preview-pane-header {
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#preview-container {
  flex: 1;
  overflow: auto;
  position: relative;
  padding: 16px;
}

/* SVG wrapper: inline-block so it sizes to the SVG's natural dimensions */
#preview-svg {
  display: inline-block;
  transform-origin: 0 0;
  position: relative;
}
#preview-svg svg {
  display: block;
}

/* Overlay: positioned exactly on top of #preview-svg */
#overlay-layer {
  position: absolute;
  top: 16px; /* matches container padding */
  left: 16px;
  pointer-events: none;
  transform-origin: 0 0;
}
#overlay-layer > * {
  pointer-events: auto;
}

/* ── Properties Pane ───────────────────────────────────────────────────────── */
#props-pane {
  display: flex;
  flex-direction: column;
  width: 220px;
  border-left: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}

#props-pane-header {
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#props-content {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  font-size: 12px;
  color: var(--text-secondary);
}

/* ── Status Bar ────────────────────────────────────────────────────────────── */
#statusbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 3px 10px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  height: 24px;
  font-family: var(--font-mono);
  font-size: 11px;
}

#status-parse { color: var(--accent-green); }
#status-parse.error { color: var(--accent-red); }
#status-info  { color: var(--text-secondary); margin-left: auto; }

/* ── Scrollbar Styling ─────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
</style>
</head>
<body>
<div id="app">

  <!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
  <div id="toolbar">
    <span class="logo">MermaidAssist</span>

    <button class="tb-btn" id="btn-open" title="ファイルを開く">Open</button>
    <button class="tb-btn" id="btn-save" title="ファイルを保存">Save</button>

    <div class="tb-sep"></div>

    <button class="tb-btn" id="btn-undo" title="元に戻す (Ctrl+Z)" disabled>↩ Undo</button>
    <button class="tb-btn" id="btn-redo" title="やり直す (Ctrl+Y)" disabled>↪ Redo</button>

    <div class="tb-sep"></div>

    <button class="tb-btn" id="btn-zoom-out" title="縮小">－</button>
    <span id="zoom-display">100%</span>
    <button class="tb-btn" id="btn-zoom-in"  title="拡大">＋</button>
    <button class="tb-btn" id="btn-zoom-fit" title="幅に合わせる">Fit</button>

    <div class="tb-sep"></div>

    <div class="export-wrap">
      <button class="tb-btn" id="btn-export" title="エクスポート">Export ▾</button>
      <div id="export-menu">
        <button id="exp-svg">SVGとして保存</button>
        <button id="exp-png">PNGとして保存</button>
        <button id="exp-png-transparent">PNG（透過背景）</button>
        <button id="exp-clipboard">クリップボードにコピー</button>
      </div>
    </div>

    <select id="diagram-type" title="図の種類">
      <option value="gantt">Gantt</option>
    </select>
  </div>

  <!-- ── Main 3-pane area ────────────────────────────────────────────────── -->
  <div id="main">

    <!-- Editor pane (30%) -->
    <div id="editor-pane">
      <div id="editor-pane-header">Editor</div>
      <div id="editor-wrap">
        <div id="line-numbers">1</div>
        <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>
    </div>

    <div class="pane-resizer" id="resizer-left"></div>

    <!-- Preview pane (flex) -->
    <div id="preview-pane">
      <div id="preview-pane-header">Preview</div>
      <div id="preview-container">
        <div id="preview-svg"></div>
        <svg id="overlay-layer" width="0" height="0"></svg>
      </div>
    </div>

    <div class="pane-resizer" id="resizer-right"></div>

    <!-- Properties pane (220px) -->
    <div id="props-pane">
      <div id="props-pane-header">Properties</div>
      <div id="props-content">
        <p style="color:var(--text-secondary);font-size:11px;">タスクを選択してください</p>
      </div>
    </div>

  </div><!-- /#main -->

  <!-- ── Status bar ──────────────────────────────────────────────────────── -->
  <div id="statusbar">
    <span id="status-parse">Ready</span>
    <span id="status-info"></span>
  </div>

</div><!-- /#app -->

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".mmd,.mermaid,.txt" style="display:none">

<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────
var STATUS_KEYWORDS = ['done', 'active', 'crit'];
var DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
var DURATION_RE = /^\d+[dwmyhMs]$/;

// ── parseGantt ─────────────────────────────────────────────────────────────
// Pure function: text → ParsedData
// ParsedData = {
//   title: string,
//   dateFormat: string,
//   axisFormat: string,
//   sections: [{ name: string, line: number }],
//   tasks: [{
//     id: string, label: string, status: string|null,
//     startDate: string|null, endDate: string|null,
//     after: string|null, line: number, sectionIndex: number
//   }]
// }
function parseGantt(text) {
  var result = {
    title: '',
    dateFormat: 'YYYY-MM-DD',
    axisFormat: '',
    sections: [],
    tasks: [],
  };

  if (!text || !text.trim()) {
    return result;
  }

  var lines = text.split('\n');
  var autoIdCounter = 0;
  var currentSectionIndex = -1;

  for (var i = 0; i < lines.length; i++) {
    var lineNum = i + 1;  // 1-based
    var raw = lines[i];
    var trimmed = raw.trim();

    // Skip empty lines, 'gantt' keyword, and comments
    if (!trimmed || trimmed === 'gantt' || trimmed.indexOf('%%') === 0) {
      continue;
    }

    // Directives we acknowledge but don't store
    if (trimmed.indexOf('excludes') === 0 || trimmed.indexOf('todayMarker') === 0) {
      continue;
    }

    // title
    if (trimmed.indexOf('title ') === 0) {
      result.title = trimmed.slice('title '.length).trim();
      continue;
    }

    // dateFormat
    if (trimmed.indexOf('dateFormat ') === 0) {
      result.dateFormat = trimmed.slice('dateFormat '.length).trim();
      continue;
    }

    // axisFormat
    if (trimmed.indexOf('axisFormat ') === 0) {
      result.axisFormat = trimmed.slice('axisFormat '.length).trim();
      continue;
    }

    // section
    if (trimmed.indexOf('section ') === 0) {
      var sectionName = trimmed.slice('section '.length).trim();
      result.sections.push({ name: sectionName, line: lineNum });
      currentSectionIndex = result.sections.length - 1;
      continue;
    }

    // Task line — must contain ':'
    if (trimmed.indexOf(':') === -1) {
      continue;
    }

    var p = parseTaskLine(raw);
    if (!p) continue;

    // Auto-generate id if not set
    var taskId = p.id !== null ? p.id : '__auto_' + (autoIdCounter++);

    result.tasks.push({
      id: taskId,
      label: p.label,
      status: p.status,
      startDate: p.startDate,
      endDate: p.endDate,
      after: p.after,
      line: lineNum,
      sectionIndex: currentSectionIndex,
    });
  }

  return result;
}

// ── Updater helpers ────────────────────────────────────────────────────────

// isDate / isDuration / isAfter — reuse constants defined above
function isDate(s) { return DATE_RE.test(s); }
function isDuration(s) { return DURATION_RE.test(s); }
function isAfter(s) { return typeof s === 'string' && s.indexOf('after ') === 0; }

// rebuildTaskMeta — reconstructs the `:metadata` portion from components.
// Omits __auto_ IDs (they are generated by the parser for tasks that had no id).
function rebuildTaskMeta(status, id, startDate, endDate, after) {
  var parts = [];
  if (status) parts.push(status);
  if (id && id.indexOf('__auto_') !== 0) parts.push(id);
  if (after && !startDate) {
    parts.push('after ' + after);
  } else if (startDate) {
    parts.push(startDate);
  }
  if (endDate) parts.push(endDate);
  return parts.join(', ');
}

// parseTaskLine — parses a single raw task line into its components.
// Returns null if the line doesn't look like a task (no colon).
function parseTaskLine(line) {
  var trimmed = line.trim();
  var colonIdx = trimmed.indexOf(':');
  if (colonIdx === -1) return null;

  var label = trimmed.slice(0, colonIdx).trim();
  var metaStr = trimmed.slice(colonIdx + 1).trim();
  var parts = metaStr.split(',').map(function(s) { return s.trim(); });

  var status = null;
  var id = null;
  var startDate = null;
  var endDate = null;
  var after = null;
  var idx = 0;

  // Detect leading whitespace (indent)
  var indent = '';
  var m = line.match(/^(\s*)/);
  if (m) indent = m[1];

  // status keyword?
  if (idx < parts.length && STATUS_KEYWORDS.indexOf(parts[idx]) !== -1) {
    status = parts[idx];
    idx++;
  }

  // 'after' at start position?
  var afterMatch = null;
  if (idx < parts.length && parts[idx].indexOf('after ') === 0) {
    afterMatch = parts[idx].slice('after '.length).trim();
    idx++;
  } else {
    // id or date/duration?
    if (idx < parts.length) {
      var candidate = parts[idx];
      if (!isDate(candidate) && !isDuration(candidate) && candidate.indexOf('after ') !== 0) {
        id = candidate;
        idx++;
      }
    }
    // 'after' after id?
    if (idx < parts.length && parts[idx].indexOf('after ') === 0) {
      afterMatch = parts[idx].slice('after '.length).trim();
      idx++;
    }
  }

  if (afterMatch !== null) {
    after = afterMatch;
    if (idx < parts.length) { endDate = parts[idx]; idx++; }
  } else {
    if (idx < parts.length) { startDate = parts[idx]; idx++; }
    if (idx < parts.length) { endDate = parts[idx]; idx++; }
  }

  return { label: label, indent: indent, status: status, id: id, startDate: startDate, endDate: endDate, after: after };
}

// updateTaskDates — replaces dates on the line at 1-based lineNum.
// Pass null for newStart or newEnd to leave that value unchanged.
// When newStart is provided, any 'after' dependency is cleared.
function updateTaskDates(text, lineNum, newStart, newEnd) {
  var lines = text.split('\n');
  var idx = lineNum - 1;
  if (idx < 0 || idx >= lines.length) return text;

  var parsed = parseTaskLine(lines[idx]);
  if (!parsed) return text;

  var start = newStart !== null && newStart !== undefined ? newStart : parsed.startDate;
  var end   = newEnd   !== null && newEnd   !== undefined ? newEnd   : parsed.endDate;
  // If a new start is given, clear 'after' dependency
  var after = (newStart !== null && newStart !== undefined) ? null : parsed.after;

  var meta = rebuildTaskMeta(parsed.status, parsed.id, start, end, after);
  lines[idx] = parsed.indent + parsed.label + ' :' + meta;
  return lines.join('\n');
}

// updateTaskField — updates label, status, or id on the line at 1-based lineNum.
// Pass null to remove status.
function updateTaskField(text, lineNum, field, value) {
  var lines = text.split('\n');
  var idx = lineNum - 1;
  if (idx < 0 || idx >= lines.length) return text;

  var parsed = parseTaskLine(lines[idx]);
  if (!parsed) return text;

  if (field === 'label') {
    parsed.label = value;
  } else if (field === 'status') {
    parsed.status = value || null;
  } else if (field === 'id') {
    parsed.id = value;
  }

  var meta = rebuildTaskMeta(parsed.status, parsed.id, parsed.startDate, parsed.endDate, parsed.after);
  lines[idx] = parsed.indent + parsed.label + ' :' + meta;
  return lines.join('\n');
}

// addTask — inserts a new task line at the end of the section identified by
// sectionIndex (0-based, from parseGantt result). Pass -1 to append at end of
// the whole diagram.
function addTask(text, sectionIndex, label, id, startDate, endDate) {
  var lines = text.split('\n');
  var parsed = parseGantt(text);
  var newLine = '    ' + label + ' :' + rebuildTaskMeta(null, id, startDate, endDate, null);

  var insertAt; // index in lines array AFTER which we insert (we splice at insertAt+1)

  if (sectionIndex === -1 || parsed.sections.length === 0) {
    // Append at end of file (trim trailing empty lines to keep it tidy)
    insertAt = lines.length - 1;
    // Back up past trailing empty lines
    while (insertAt > 0 && lines[insertAt].trim() === '') insertAt--;
    lines.splice(insertAt + 1, 0, newLine);
    return lines.join('\n');
  }

  // Find the last task line that belongs to this section, or fall back to the
  // section header line itself.
  var sectionLine = parsed.sections[sectionIndex].line; // 1-based
  var lastLineInSection = sectionLine; // 1-based, will advance

  // The next section starts at…
  var nextSectionLine = parsed.sections.length > sectionIndex + 1
    ? parsed.sections[sectionIndex + 1].line  // 1-based
    : lines.length + 1;                        // sentinel beyond end

  // Walk tasks to find the last one in this section
  for (var i = 0; i < parsed.tasks.length; i++) {
    if (parsed.tasks[i].sectionIndex === sectionIndex) {
      if (parsed.tasks[i].line > lastLineInSection) {
        lastLineInSection = parsed.tasks[i].line;
      }
    }
  }

  // Make sure we don't overshoot into the next section
  if (lastLineInSection >= nextSectionLine) {
    lastLineInSection = nextSectionLine - 1;
  }

  // Insert after lastLineInSection (convert to 0-based index)
  lines.splice(lastLineInSection, 0, newLine); // splice(lastLineInSection, 0, ...) inserts AFTER that index (0-based = 1-based - 1 + 1)
  return lines.join('\n');
}

// deleteTask — removes the line at 1-based lineNum.
function deleteTask(text, lineNum) {
  var lines = text.split('\n');
  var idx = lineNum - 1;
  if (idx < 0 || idx >= lines.length) return text;
  lines.splice(idx, 1);
  return lines.join('\n');
}

// ── Date Helpers ──────────────────────────────────────────────────────────
function daysBetween(dateStr1, dateStr2) {
  var d1 = new Date(dateStr1), d2 = new Date(dateStr2);
  return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
}

function addDays(dateStr, days) {
  var d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().substring(0, 10);
}

// ── Calibration (ADR-010) ─────────────────────────────────────────────────
var calibration = { pxPerDay: 0, originX: 0, baseDate: '', barRects: [] };

function calibrateScale(svgEl, parsedData) {
  calibration = { pxPerDay: 0, originX: 0, baseDate: '', barRects: [] };
  if (!svgEl || !parsedData || !parsedData.tasks || parsedData.tasks.length === 0) return;

  // Collect task bar rects from SVG
  var rects = [];
  var selectors = ['rect.task', 'rect.task0', 'rect.task1', 'rect.task2', 'rect.task3'];
  for (var si = 0; si < selectors.length; si++) {
    var found = svgEl.querySelectorAll(selectors[si]);
    for (var fi = 0; fi < found.length; fi++) {
      rects.push(found[fi]);
    }
  }

  // Fallback: section groups
  if (rects.length === 0) {
    var sectionSelectors = ['.section0', '.section1', '.section2', '.section3'];
    for (var ssi = 0; ssi < sectionSelectors.length; ssi++) {
      var groups = svgEl.querySelectorAll(sectionSelectors[ssi]);
      for (var gi = 0; gi < groups.length; gi++) {
        var groupRects = groups[gi].querySelectorAll('rect');
        for (var gri = 0; gri < groupRects.length; gri++) {
          rects.push(groupRects[gri]);
        }
      }
    }
  }

  // Last fallback: all rects with height 10-50px and width >10px
  if (rects.length === 0) {
    var allRects = svgEl.querySelectorAll('rect');
    for (var ari = 0; ari < allRects.length; ari++) {
      var bbox;
      try { bbox = allRects[ari].getBBox(); } catch (e) { continue; }
      if (bbox.height >= 10 && bbox.height <= 50 && bbox.width > 10) {
        rects.push(allRects[ari]);
      }
    }
  }

  // Store barRects with bounding boxes
  var barRects = [];
  for (var bri = 0; bri < rects.length; bri++) {
    try {
      var bb = rects[bri].getBBox();
      barRects.push({ el: rects[bri], x: bb.x, y: bb.y, width: bb.width, height: bb.height });
    } catch (e) { /* skip */ }
  }
  calibration.barRects = barRects;

  // Need tasks with known dates for calibration
  var tasksWithDates = [];
  for (var ti = 0; ti < parsedData.tasks.length; ti++) {
    var task = parsedData.tasks[ti];
    if (task.startDate && DATE_RE.test(task.startDate)) {
      tasksWithDates.push({ task: task, index: ti });
    }
  }

  if (tasksWithDates.length === 0 || barRects.length === 0) return;

  // Find two tasks with different startDates and corresponding rects
  var calibrated = false;
  for (var ci = 0; ci < tasksWithDates.length && !calibrated; ci++) {
    for (var cj = ci + 1; cj < tasksWithDates.length && !calibrated; cj++) {
      var t1 = tasksWithDates[ci], t2 = tasksWithDates[cj];
      if (t1.task.startDate === t2.task.startDate) continue;
      if (t1.index >= barRects.length || t2.index >= barRects.length) continue;
      var r1 = barRects[t1.index], r2 = barRects[t2.index];
      var dDays = daysBetween(t1.task.startDate, t2.task.startDate);
      if (dDays === 0) continue;
      calibration.pxPerDay = (r2.x - r1.x) / dDays;
      calibration.originX = r1.x;
      calibration.baseDate = t1.task.startDate;
      calibrated = true;
    }
  }

  // Single-task fallback
  if (!calibrated && tasksWithDates.length >= 1) {
    var st = tasksWithDates[0];
    if (st.index < barRects.length && st.task.endDate && DATE_RE.test(st.task.endDate)) {
      var dur = daysBetween(st.task.startDate, st.task.endDate);
      if (dur > 0) {
        calibration.pxPerDay = barRects[st.index].width / dur;
        calibration.originX = barRects[st.index].x;
        calibration.baseDate = st.task.startDate;
      }
    }
  }
}

function pxToDate(px) {
  if (calibration.pxPerDay === 0) return null;
  var daysDelta = Math.round((px - calibration.originX) / calibration.pxPerDay);
  return addDays(calibration.baseDate, daysDelta);
}

function dateToPx(dateStr) {
  if (calibration.pxPerDay === 0) return 0;
  return calibration.originX + daysBetween(calibration.baseDate, dateStr) * calibration.pxPerDay;
}

// ── Selection Functions ───────────────────────────────────────────────────
function isSelected(id) {
  return sel.some(function(s) { return s.id === id; });
}

function selectItem(type, id, multi) {
  if (multi) {
    var found = false;
    for (var i = 0; i < sel.length; i++) {
      if (sel[i].id === id) {
        sel.splice(i, 1);
        found = true;
        break;
      }
    }
    if (!found) {
      sel.push({ type: type, id: id });
    }
  } else {
    sel = [{ type: type, id: id }];
  }
  renderProps();
  rebuildOverlay();
}

function clearSelection() {
  sel = [];
  renderProps();
  rebuildOverlay();
}

function rebuildOverlay() {
  if (!currentModule || !overlayEl) return;
  var svgEl = previewSvgEl ? previewSvgEl.querySelector('svg') : null;
  if (svgEl) {
    currentModule.buildOverlay(svgEl, parsed);
  }
}

// ── HTML Escape Helper ────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Property Panel Helpers ────────────────────────────────────────────────
function bindPropInput(elId, lineNum, field) {
  var el = document.getElementById(elId);
  if (!el) return;
  el.addEventListener('change', function() {
    pushHistory();
    mmdText = updateTaskField(mmdText, lineNum, field, el.value);
    suppressSync = true;
    editorEl.value = mmdText;
    suppressSync = false;
    syncLineNumbers();
    scheduleRefresh();
  });
}

function bindPropDate(startId, endId, lineNum) {
  var startEl = document.getElementById(startId);
  var endEl = document.getElementById(endId);
  if (startEl) {
    startEl.addEventListener('change', function() {
      pushHistory();
      mmdText = updateTaskDates(mmdText, lineNum, startEl.value, null);
      suppressSync = true;
      editorEl.value = mmdText;
      suppressSync = false;
      syncLineNumbers();
      scheduleRefresh();
    });
  }
  if (endEl) {
    endEl.addEventListener('change', function() {
      pushHistory();
      mmdText = updateTaskDates(mmdText, lineNum, null, endEl.value);
      suppressSync = true;
      editorEl.value = mmdText;
      suppressSync = false;
      syncLineNumbers();
      scheduleRefresh();
    });
  }
}

  buildOverlay: function(svgEl, parsedData) {
    if (!overlayEl) return;

      var br = barRects[i];

        hlRect.setAttribute('height', br.height + 4);

        hlRect.setAttribute('stroke-dasharray', '4');
        hlRect.setAttribute('rx', '3');

      var overlayRect = document.createElementNS(NS, 'rect');
      overlayRect.setAttribute('x', br.x);
      overlayRect.setAttribute('y', br.y);
      overlayRect.setAttribute('width', br.width);
      overlayRect.setAttribute('height', br.height);

      rightHandle.setAttribute('width', '6');

      var secId = selData[0].id;
      var section = null;
      if (parsedData && parsedData.sections) {
        for (var sci = 0; sci < parsedData.sections.length; sci++) {
          if (parsedData.sections[sci].name === secId) {
            section = parsedData.sections[sci];
            break;
          }
        }
      }
      if (!section) {
        propsEl.innerHTML = '<p style="color:var(--text-secondary);font-size:11px;">セクションが見つかりません</p>';
        return;
      }

      // Tasks in this section
      var secTasks = [];
      if (parsedData && parsedData.tasks) {
        var secIndex = parsedData.sections.indexOf(section);
        for (var sti2 = 0; sti2 < parsedData.tasks.length; sti2++) {
          if (parsedData.tasks[sti2].sectionIndex === secIndex) {
            secTasks.push(parsedData.tasks[sti2]);
          }
        }
      }

      var taskList = secTasks.map(function(t) {
        return '<div style="padding:2px 4px;font-size:11px;color:var(--text-primary);">' + escHtml(t.label) + '</div>';
      }).join('');

      propsEl.innerHTML =
        '<div style="margin-bottom:8px;">' +
          '<label style="display:block;font-size:10px;color:var(--text-secondary);margin-bottom:2px;">セクション名</label>' +
          '<input id="prop-sec-name" type="text" value="' + escHtml(section.name) + '" style="width:100%;background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);padding:3px 6px;border-radius:3px;font-size:12px;">' +
        '</div>' +
        '<div style="margin-bottom:8px;">' +
          '<label style="display:block;font-size:10px;color:var(--text-secondary);margin-bottom:4px;">タスク一覧</label>' +
          taskList +
        '</div>';

      // Bind section name change
      var secNameEl = document.getElementById('prop-sec-name');
      if (secNameEl) {
        secNameEl.addEventListener('change', function() {
          pushHistory();
          var lines = mmdText.split('\n');
          var idx = section.line - 1;
          if (idx >= 0 && idx < lines.length) {
            var indent = lines[idx].match(/^(\s*)/)[1];
            lines[idx] = indent + 'section ' + secNameEl.value;
            mmdText = lines.join('\n');
            suppressSync = true;
            editorEl.value = mmdText;
            suppressSync = false;
            syncLineNumbers();
            scheduleRefresh();
          }
        });
      }
      return;
    }

    // Default fallback
    propsEl.innerHTML = '<p style="color:var(--text-secondary);font-size:11px;">タスクを選択してください</p>';
  },
  updateText: function(text, change) {
    if (change.type === 'dates')  return updateTaskDates(text, change.line, change.startDate, change.endDate);
    if (change.type === 'field')  return updateTaskField(text, change.line, change.field, change.value);
    if (change.type === 'add')    return addTask(text, change.sectionIndex, change.label, change.id, change.startDate, change.endDate);
    if (change.type === 'delete') return deleteTask(text, change.line);
    return text;
  },
  exportMmd: function(parsedData) { return mmdText; },
};

// ── Line Numbers ───────────────────────────────────────────────────────────
function syncLineNumbers() {
  if (!editorEl || !lineNumEl) return;
  var lineCount = editorEl.value.split('\n').length;
  var nums = [];
  for (var i = 1; i <= lineCount; i++) nums.push(i);
  lineNumEl.textContent = nums.join('\n');
  // Sync scroll position
  lineNumEl.scrollTop = editorEl.scrollTop;
}

// ── History (Undo / Redo) ──────────────────────────────────────────────────
function pushHistory() {
  undoStack.push(mmdText);
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  future = [];
  updateHistoryButtons();
}

function undo() {
  if (undoStack.length === 0) return;
  future.push(mmdText);
  mmdText = undoStack.pop();
  suppressSync = true;
  editorEl.value = mmdText;
  suppressSync = false;
  syncLineNumbers();
  scheduleRefresh();
  updateHistoryButtons();
}

function redo() {
  if (future.length === 0) return;
  undoStack.push(mmdText);
  mmdText = future.pop();
  suppressSync = true;
  editorEl.value = mmdText;
  suppressSync = false;
  syncLineNumbers();
  scheduleRefresh();
  updateHistoryButtons();
}

function updateHistoryButtons() {
  var btnUndo = document.getElementById('btn-undo');
  var btnRedo = document.getElementById('btn-redo');
  if (btnUndo) btnUndo.disabled = undoStack.length === 0;
  if (btnRedo) btnRedo.disabled = future.length === 0;
}

// ── Module Detection ───────────────────────────────────────────────────────
function detectModule(text) {
  var keys = Object.keys(modules);
  for (var i = 0; i < keys.length; i++) {
    if (modules[keys[i]].detect(text)) return modules[keys[i]];
  }
  return null;
}

// ── Refresh Pipeline ───────────────────────────────────────────────────────
function scheduleRefresh() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(refresh, DEBOUNCE_MS);
}

async function refresh() {
  if (!previewSvgEl) return;

  var thisRender = ++renderCounter;

  // Detect diagram module
  currentModule = detectModule(mmdText);

  // Parse
  if (currentModule) {
    try {
      parsed = currentModule.parse(mmdText);
    } catch (e) {
      parsed = { title: '', dateFormat: 'YYYY-MM-DD', axisFormat: '', sections: [], tasks: [] };
    }
  }

  // Render via mermaid.js
  var svgId = 'mermaid-svg-' + thisRender;
  try {
    var renderResult = await mermaid.render(svgId, mmdText);
    // Guard: if a newer render was started, discard this result
    if (thisRender !== renderCounter) return;

    previewSvgEl.innerHTML = renderResult.svg;

    var svgEl = previewSvgEl.querySelector('svg');
    if (svgEl) {
      // ── Fix mermaid.js SVG sizing ──
      // mermaid.js outputs width="100%" + max-width inline style.
      // This causes the SVG to collapse inside an inline-block parent.
      // Fix: set explicit pixel dimensions from the viewBox.
      var vb = svgEl.viewBox.baseVal;
      var naturalW = vb.width || 800;
      var naturalH = vb.height || 400;

      // Remove all mermaid inline styles (max-width, width:100%, etc.)
      svgEl.removeAttribute('style');
      // Set to natural pixel dimensions from viewBox
      svgEl.setAttribute('width', naturalW);
      svgEl.setAttribute('height', naturalH);

      // Sync overlay to same natural dimensions and viewBox
      if (overlayEl) {
        overlayEl.setAttribute('width', naturalW);
        overlayEl.setAttribute('height', naturalH);
        overlayEl.setAttribute('viewBox', svgEl.getAttribute('viewBox'));
      }

      // Auto-fit zoom on first render: fit chart width to container
      if (thisRender === 1) {
        var previewContainer = document.getElementById('preview-container');
        var containerW = previewContainer.clientWidth - 32;
        var fitZoom = containerW / naturalW;
        fitZoom = Math.max(0.25, Math.min(3.0, fitZoom));
        zoom = Math.round(fitZoom * 100) / 100;
      }
    }

    // Apply zoom via CSS transform on wrapper (both SVG and overlay)
    previewSvgEl.style.transform = 'scale(' + zoom + ')';
    previewSvgEl.style.transformOrigin = 'top left';
    if (overlayEl) {
      overlayEl.style.transform = 'scale(' + zoom + ')';
      overlayEl.style.transformOrigin = 'top left';
    }
    if (zoomDisplayEl) zoomDisplayEl.textContent = Math.round(zoom * 100) + '%';

    // Build overlay
    if (currentModule && svgEl) {
      currentModule.buildOverlay(svgEl, parsed);
    }

    statusParseEl.textContent = 'OK';
    statusParseEl.classList.remove('error');
  } catch (e) {
    if (thisRender !== renderCounter) return;
    previewSvgEl.innerHTML = '<p style="color:var(--accent-red);padding:16px;font-family:var(--font-mono);font-size:12px;">Render error:<br>' + String(e).replace(/</g, '&lt;') + '</p>';
    statusParseEl.textContent = 'Error';
    statusParseEl.classList.add('error');
  }

  renderProps();
  renderStatus();
  syncLineNumbers();
}

// ── Status Bar ─────────────────────────────────────────────────────────────
function renderStatus() {
  if (!statusInfoEl) return;
  var info = '';
  if (parsed && parsed.tasks && parsed.tasks.length > 0) {
    info = 'タスク: ' + parsed.tasks.length;
    if (parsed.sections && parsed.sections.length > 0) info += ' | セクション: ' + parsed.sections.length;
    // Calculate date range
    var dates = parsed.tasks.filter(function(t) { return t.startDate; }).map(function(t) { return t.startDate; });
    var endDates = parsed.tasks.filter(function(t) { return t.endDate && DATE_RE.test(t.endDate); }).map(function(t) { return t.endDate; });
    var allDates = dates.concat(endDates).sort();
    if (allDates.length >= 2) {
      info += ' | 期間: ' + allDates[0] + ' ~ ' + allDates[allDates.length - 1];
    }
  }
  statusInfoEl.textContent = info;
}

// ── Properties Panel ───────────────────────────────────────────────────────
function renderProps() {
  if (!propsEl || !currentModule) return;
  currentModule.renderProps(sel, parsed);
}

// ── Zoom ───────────────────────────────────────────────────────────────────
function setZoom(z) {
  zoom = Math.max(0.1, Math.min(5.0, z));
  if (zoomDisplayEl) zoomDisplayEl.textContent = Math.round(zoom * 100) + '%';

  if (previewSvgEl) {
    previewSvgEl.style.transform = 'scale(' + zoom + ')';
    previewSvgEl.style.transformOrigin = '0 0';
  }
  if (overlayEl) {
    overlayEl.style.transform = 'scale(' + zoom + ')';
    overlayEl.style.transformOrigin = '0 0';
  }
}

function zoomToFit() {
  var svgEl = previewSvgEl ? previewSvgEl.querySelector('svg') : null;
  var previewContainer = document.getElementById('preview-container');
  if (!svgEl || !previewContainer) return;
  var naturalW = parseFloat(svgEl.getAttribute('width')) || 800;
  var containerW = previewContainer.clientWidth - 32;
  var fitZoom = containerW / naturalW;
  setZoom(Math.round(fitZoom * 100) / 100);
}

// ── File Open / Save ───────────────────────────────────────────────────────
function openFile() {
  document.getElementById('file-input').click();
}

function saveFile() {
  var blob = new Blob([mmdText], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (parsed.title || 'untitled') + '.mmd';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Export Functions ───────────────────────────────────────────────────────
function exportSVG() {
  var svgEl = previewSvgEl.querySelector('svg');
  if (!svgEl) return;
  var clone = svgEl.cloneNode(true);
  var blob = new Blob([new XMLSerializer().serializeToString(clone)], { type: 'image/svg+xml' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (parsed.title || 'untitled') + '.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

function svgToCanvas(transparent, callback) {
  var svgEl = previewSvgEl.querySelector('svg');
  if (!svgEl) return;
  var clone = svgEl.cloneNode(true);
  var svgData = new XMLSerializer().serializeToString(clone);
  var img = new Image();
  img.onload = function() {
    var canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    var ctx = canvas.getContext('2d');
    if (!transparent) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    ctx.drawImage(img, 0, 0);
    callback(canvas);
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
}

function exportPNG(transparent) {
  svgToCanvas(transparent, function(canvas) {
    canvas.toBlob(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (parsed.title || 'untitled') + '.png';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  });
}

function exportClipboard() {
  svgToCanvas(false, function(canvas) {
    canvas.toBlob(function(blob) {
      navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    });
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  // DOM references
  editorEl      = document.getElementById('editor');
  lineNumEl     = document.getElementById('line-numbers');
  previewSvgEl  = document.getElementById('preview-svg');
  overlayEl     = document.getElementById('overlay-layer');
  propsEl       = document.getElementById('props-content');
  statusParseEl = document.getElementById('status-parse');
  statusInfoEl  = document.getElementById('status-info');
  zoomDisplayEl = document.getElementById('zoom-display');

  // Init mermaid.js
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    securityLevel: 'loose',
  });

  // Default content
  mmdText = [
    'gantt',
    '    title プロジェクト計画',
    '    dateFormat YYYY-MM-DD',
    '    axisFormat %m/%d',
    '',
    '    section 要件定義',
    '    要件分析           :a1, 2026-04-01, 2026-04-15',
    '    仕様書作成         :a2, after a1, 2026-04-25',
    '',
    '    section 設計',
    '    基本設計           :b1, 2026-04-20, 2026-05-05',
    '    詳細設計           :b2, after b1, 2026-05-15',
  ].join('\n');

  editorEl.value = mmdText;
  syncLineNumbers();
  updateHistoryButtons();
  setZoom(1.0);

  // ── Editor events ────────────────────────────────────────────────────────
  editorEl.addEventListener('input', function() {
    if (suppressSync) return;
    pushHistory();
    mmdText = editorEl.value;
    scheduleRefresh();
  });

  editorEl.addEventListener('scroll', function() {
    syncLineNumbers();
  });

  // ── Toolbar buttons ──────────────────────────────────────────────────────
  document.getElementById('btn-open').addEventListener('click', openFile);
  document.getElementById('btn-save').addEventListener('click', saveFile);
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);

  document.getElementById('btn-zoom-in').addEventListener('click', function() {
    setZoom(zoom + 0.1);
  });
  document.getElementById('btn-zoom-out').addEventListener('click', function() {
    setZoom(zoom - 0.1);
  });
  document.getElementById('btn-zoom-fit').addEventListener('click', function() {
    zoomToFit();
  });

  // ── File input handler ───────────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      pushHistory();
      mmdText = ev.target.result;
      suppressSync = true;
      editorEl.value = mmdText;
      suppressSync = false;
      syncLineNumbers();
      scheduleRefresh();
    };
    reader.readAsText(file);
    // Reset so same file can be reopened
    e.target.value = '';
  });

  // ── Export menu toggle ───────────────────────────────────────────────────
  var btnExport  = document.getElementById('btn-export');
  var exportMenu = document.getElementById('export-menu');

  btnExport.addEventListener('click', function(e) {
    e.stopPropagation();
    exportMenu.classList.toggle('open');
  });

  document.addEventListener('click', function() {
    exportMenu.classList.remove('open');
  });

  // Export actions
  document.getElementById('exp-svg').addEventListener('click', function() {
    exportMenu.classList.remove('open');
    exportSVG();
  });

  document.getElementById('exp-png').addEventListener('click', function() {
    exportMenu.classList.remove('open');
    exportPNG(false);
  });

  document.getElementById('exp-png-transparent').addEventListener('click', function() {
    exportMenu.classList.remove('open');
    exportPNG(true);
  });

  document.getElementById('exp-clipboard').addEventListener('click', function() {
    exportMenu.classList.remove('open');
    exportClipboard();
  });

  // ── Ctrl+wheel zoom / Shift+wheel horizontal scroll on preview ───────────
  var previewContainer = document.getElementById('preview-container');
  previewContainer.addEventListener('wheel', function(e) {
    if (e.ctrlKey) {
      e.preventDefault();
      var delta = e.deltaY < 0 ? 0.1 : -0.1;
      setZoom(zoom + delta);
    } else if (e.shiftKey && !e.ctrlKey) {
      // Shift+Wheel → horizontal scroll
      previewContainer.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, { passive: false });

  // ── Overlay click + drag handling ─────────────────────────────────────────
  overlayEl.addEventListener('mousedown', function(e) {
    var target = e.target;
    var taskId = target.getAttribute('data-task-id');
    var handle = target.getAttribute('data-handle');
    var lineNum = target.getAttribute('data-line');
    var index = target.getAttribute('data-index');

    // Click on empty overlay area (no task): clear selection
    if (!taskId && !e.shiftKey) {
      clearSelection();
      return;
    }

    if (!taskId) return;

    // Select the task
    if (!handle) {
      selectItem('task', taskId, e.shiftKey);
    }

    // Initiate drag if calibration is available
    if (calibration.pxPerDay !== 0 && lineNum) {
      var lineNumInt = parseInt(lineNum, 10);
      var indexInt = parseInt(index, 10);

      // Find the task data to get original dates
      var task = null;
      if (parsed && parsed.tasks) {
        for (var dti = 0; dti < parsed.tasks.length; dti++) {
          if (parsed.tasks[dti].id === taskId) { task = parsed.tasks[dti]; break; }
        }
      }
      if (task && task.startDate && DATE_RE.test(task.startDate)) {
        // Create SVG point from mouse coordinates
        var svgEl = previewSvgEl.querySelector('svg');
        if (svgEl && svgEl.createSVGPoint) {
          var pt = svgEl.createSVGPoint();
          pt.x = e.clientX;
          pt.y = e.clientY;
          try {
            var ctm = svgEl.getScreenCTM();
            if (ctm) {
              var svgPt = pt.matrixTransform(ctm.inverse());
              var br = calibration.barRects[indexInt];
              pushHistory();
              dragState = {
                taskId: taskId,
                lineNum: lineNumInt,
                handle: handle || null,
                startX: svgPt.x,
                origStartDate: task.startDate,
                origEndDate: task.endDate || '',
                origBarX: br ? br.x : 0,
                origBarW: br ? br.width : 0,
              };
            }
          } catch (ex) { /* can't get CTM */ }
        }
      }
    }

    e.preventDefault();
    e.stopPropagation();
  });

  // Click on preview-container background: clear selection
  document.getElementById('preview-container').addEventListener('mousedown', function(e) {
    if (e.target === this || e.target === previewSvgEl) {
      clearSelection();
    }
  });

  // ── Document mousemove (drag) ───────────────────────────────────────────
  document.addEventListener('mousemove', function(e) {
    if (!dragState) return;

    var svgEl = previewSvgEl.querySelector('svg');
    if (!svgEl || !svgEl.createSVGPoint) return;

    var pt = svgEl.createSVGPoint();
    pt.x = e.clientX;
    pt.y = e.clientY;

    try {
      var ctm = svgEl.getScreenCTM();
      if (!ctm) return;
      var svgPt = pt.matrixTransform(ctm.inverse());
      var dx = svgPt.x - dragState.startX;
      var daysDelta = Math.round(dx / calibration.pxPerDay);

      if (daysDelta === 0) return;

      if (dragState.handle === null) {
        // Move: shift both dates
        var newStart = addDays(dragState.origStartDate, daysDelta);
        var newEnd = dragState.origEndDate && DATE_RE.test(dragState.origEndDate) ? addDays(dragState.origEndDate, daysDelta) : null;
        mmdText = updateTaskDates(mmdText, dragState.lineNum, newStart, newEnd);
      } else if (dragState.handle === 'left') {
        // Resize left: shift start date only
        var newStart2 = addDays(dragState.origStartDate, daysDelta);
        mmdText = updateTaskDates(mmdText, dragState.lineNum, newStart2, null);
      } else if (dragState.handle === 'right') {
        // Resize right: shift end date only
        if (dragState.origEndDate && DATE_RE.test(dragState.origEndDate)) {
          var newEnd2 = addDays(dragState.origEndDate, daysDelta);
          mmdText = updateTaskDates(mmdText, dragState.lineNum, null, newEnd2);
        }
      }

      suppressSync = true;
      editorEl.value = mmdText;
      suppressSync = false;
      syncLineNumbers();
      scheduleRefresh();
    } catch (ex) { /* ignore CTM errors */ }
  });

  // ── Document mouseup (end drag) ─────────────────────────────────────────
  document.addEventListener('mouseup', function() {
    dragState = null;
  });

  // ── Keyboard shortcuts ───────────────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    var tag = e.target.tagName;
    var inInput = (tag === 'INPUT' || tag === 'SELECT');
    var inEditor = (e.target === editorEl);

    if (e.ctrlKey && e.key === 'z') {
      if (inEditor) return;
      e.preventDefault(); undo();
    } else if (e.ctrlKey && e.key === 'y') {
      if (inEditor) return;
      e.preventDefault(); redo();
    } else if (e.ctrlKey && e.key === 's') {
      e.preventDefault(); saveFile();
    } else if (e.ctrlKey && e.key === 'o') {
      e.preventDefault(); openFile();
    } else if (e.key === 'Delete' && !inInput && !inEditor) {
      if (sel.length === 0) return;
      pushHistory();
      var lines = sel.map(function(s) {
        var t = parsed.tasks.find(function(tk) { return tk.id === s.id; });
        return t ? t.line : -1;
      }).filter(function(l) { return l > 0; }).sort(function(a, b) { return b - a; });
      lines.forEach(function(l) { mmdText = deleteTask(mmdText, l); });
      suppressSync = true;
      editorEl.value = mmdText;
      suppressSync = false;
      sel = [];
      syncLineNumbers();
      scheduleRefresh();
    } else if (e.key === 'Escape') {
      clearSelection();
    } else if (e.ctrlKey && e.key === 'a' && !inEditor && !inInput) {
      e.preventDefault();
      sel = parsed.tasks.map(function(t) { return { type: 'task', id: t.id }; });
      renderProps();
      if (currentModule) {
        var svgEl = previewSvgEl.querySelector('svg');
        if (svgEl) currentModule.buildOverlay(svgEl, parsed);
      }
    } else if (e.ctrlKey && e.shiftKey && e.key === 'C') {
      e.preventDefault(); exportClipboard();
    } else if (e.ctrlKey && e.key === 'c' && !inEditor && !inInput && sel.length > 0) {
      e.preventDefault();
      clipboard = sel.map(function(s) {
        return parsed.tasks.find(function(t) { return t.id === s.id; });
      }).filter(Boolean);
    } else if (e.ctrlKey && e.key === 'v' && !inEditor && !inInput && clipboard && clipboard.length > 0) {
      e.preventDefault();
      pushHistory();
      clipboard.forEach(function(t) {
        var newId = '__new_' + (++addCounter);
        var newStart = t.startDate ? addDays(t.startDate, 7) : null;
        var newEnd = t.endDate && !isDuration(t.endDate) ? addDays(t.endDate, 7) : t.endDate;
        mmdText = addTask(mmdText, t.sectionIndex, t.label, newId, newStart, newEnd);
      });
      suppressSync = true;
      editorEl.value = mmdText;
      suppressSync = false;
      syncLineNumbers();
      scheduleRefresh();
    }
  });

  // ── Pane Resizers ─────────────────────────────────────────────────────────
  function setupResizer(resizerId, leftPaneId, rightPaneId, direction) {
    var resizer = document.getElementById(resizerId);
    var leftPane = document.getElementById(leftPaneId);
    var rightPane = document.getElementById(rightPaneId);
    if (!resizer || !leftPane) return;

    var startX, startLeftW, startRightW;

    resizer.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startX = e.clientX;
      startLeftW = leftPane.getBoundingClientRect().width;
      if (rightPane) startRightW = rightPane.getBoundingClientRect().width;
      resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';

      function onMouseMove(e2) {
        var dx = e2.clientX - startX;
        if (direction === 'left') {
          var newW = Math.max(150, startLeftW + dx);
          leftPane.style.width = newW + 'px';
        } else if (direction === 'right') {
          var newW2 = Math.max(150, startRightW - dx);
          rightPane.style.width = newW2 + 'px';
        }
      }

      function onMouseUp() {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        resizer.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        // Re-render with new container width
        scheduleRefresh();
      }

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  }

  setupResizer('resizer-left', 'editor-pane', null, 'left');
  setupResizer('resizer-right', null, 'props-pane', 'right');

  // ── Initial render ───────────────────────────────────────────────────────
  scheduleRefresh();
}


// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);

// ── Export hook for tests ──────────────────────────────────────────────────
if (typeof __exportForTest === 'function') {
  __exportForTest({
    parseGantt: parseGantt,
    updateTaskDates: updateTaskDates,
    updateTaskField: updateTaskField,
    addTask: addTask,
    deleteTask: deleteTask,
    daysBetween: daysBetween,
    addDays: addDays,
  });
}
</script>

<script src="lib/mermaid.min.js"></script>
